<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-menu" id="nav-menu">
            <li><span class="icon">🏠</span><a href="#">Головна</a></li>
            <li><span class="icon">📁</span><a href="#">Проєкти</a></li>
            <li><span class="icon">☕</span><a href="#">Кафе</a></li>
            <li><span class="icon">📞</span><a href="#">Контакти</a></li>
        </ul>
    </nav>

    <div class="carousel-container">
        <div class="carousel-slide active">
            <img src="https://placehold.co/800x400?text=Slide+1" alt="Slide 1">
        </div>
        <div class="carousel-slide">
            <img src="https://placehold.co/800x400?text=Slide+2" alt="Slide 2">
        </div>
        <div class="carousel-slide">
            <img src="https://placehold.co/800x400?text=Slide+3" alt="Slide 3">
        </div>

        <button class="prev" id="prevBtn">&#10094;</button>
        <button class="next" id="nextBtn">&#10095;</button>

        <div class="dots-container" id="dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
        </div>
    </div>

    <section class="content-blocks">
        <div class="large-only">
            <h3>Тільки для Large-пристроїв (>=768px)</h3>
            <img src="https://placehold.co/200x150?text=Large+1" alt="L1">
            <img src="https://placehold.co/200x150?text=Large+2" alt="L2">
        </div>
        <div class="medium-only">
            <h3>Тільки для Medium-пристроїв (<768px)</h3>
            <img src="https://placehold.co/150x100?text=Med+1" alt="M1">
            <img src="https://placehold.co/150x100?text=Med+2" alt="M2">
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
